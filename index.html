<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>N-Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ── Design tokens — Premium Purple/Indigo Theme ──────────────────────── */
:root {
  --bg:        #0a0a14;
  --bg2:       #0f0f1e;
  --surface:   #15152a;
  --surface2:  #1c1c38;
  --surface3:  #252548;
  --border:    #2d2d55;
  --border2:   #3d3d75;

  --accent:        #8b5cf6;
  --accent2:       #a78bfa;
  --accent-lo:     rgba(139,92,246,.14);
  --accent-glow:   rgba(139,92,246,.45);
  --accent-grad:   linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
  --accent-grad2:  linear-gradient(135deg, #8b5cf6, #6366f1);

  --pink:      #ec4899;
  --green:     #10b981;
  --green-lo:  rgba(16,185,129,.14);
  --amber:     #f59e0b;
  --red:       #f43f5e;

  --text:      #f5f5fa;
  --text2:     #b4b4cc;
  --text3:     #6b6b88;

  --r:  16px;
  --rs: 11px;
  --rx: 24px;

  --ease: cubic-bezier(.25,.46,.45,.94);
  --shadow-glow: 0 8px 32px rgba(139,92,246,.35);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text',
               'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,92,246,.18), transparent),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(236,72,153,.10), transparent);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  overscroll-behavior: none;
  padding-bottom: 110px;
}

/* ── Scrollbar ───────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ══════════════════════════════════════════════════════════════════════
   HEADER
   ══════════════════════════════════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,20,.78);
  backdrop-filter: blur(24px) saturate(1.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.8);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 0;
}
.header-top {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.logo { display: flex; align-items: center; gap: 11px; }
.logo-glyph {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: var(--accent-grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 0 1px rgba(139,92,246,.4), 0 6px 18px rgba(139,92,246,.45);
  position: relative;
  overflow: hidden;
}
.logo-glyph::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.25), transparent 50%);
}
.logo-label { line-height: 1; }
.logo-name  {
  font-size: 18px; font-weight: 800; letter-spacing: -.5px;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo-sub   { font-size: 11px; color: var(--text3); margin-top: 3px; font-weight: 500; }

.header-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  position: relative;
  width: 42px; height: 42px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px;
  transition: all .2s var(--ease);
}
.icon-btn:active {
  background: var(--surface3);
  transform: scale(.94);
}
.badge {
  position: absolute; top: -5px; right: -5px;
  min-width: 20px; height: 20px;
  background: var(--accent-grad);
  color: #fff; font-size: 10px; font-weight: 800;
  border-radius: 10px; padding: 0 6px;
  display: none; align-items: center; justify-content: center;
  border: 2px solid var(--bg);
  box-shadow: 0 2px 8px var(--accent-glow);
  animation: badgePop .3s var(--ease);
}
.badge.show { display: flex; }
@keyframes badgePop {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* ── Search ──────────────────────────────────────────────────────────── */
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 15px; pointer-events: none;
  color: var(--text3);
}
.search-input {
  width: 100%;
  height: 42px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  color: var(--text);
  font-size: 14px;
  padding: 0 14px 0 38px;
  outline: none;
  transition: all .25s var(--ease);
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus {
  border-color: var(--accent);
  background: var(--surface);
  box-shadow: 0 0 0 4px var(--accent-lo);
}

/* ── Tabs ────────────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.tab {
  flex: 1; padding: 12px 0;
  text-align: center;
  font-size: 13px; font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
  position: relative;
}
.tab.active {
  color: var(--accent2);
  border-bottom-color: var(--accent);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 25%; right: 25%;
  height: 2px;
  background: var(--accent-grad);
  border-radius: 2px;
  box-shadow: 0 0 12px var(--accent-glow);
}

/* ══════════════════════════════════════════════════════════════════════
   PAGES
   ══════════════════════════════════════════════════════════════════════ */
.page { display: none; padding: 16px; }
.page.active { display: block; animation: fadeIn .25s var(--ease); }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.section-label {
  font-size: 11px; font-weight: 700;
  color: var(--text3); letter-spacing: 1px;
  text-transform: uppercase;
  margin: 4px 0 12px;
  display: flex; align-items: center; gap: 6px;
}
.section-label::before {
  content: '';
  width: 3px; height: 12px;
  background: var(--accent-grad);
  border-radius: 2px;
}

/* ── Channel card — Premium glass design ──────────────────────────────── */
.channel-card {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 13px;
  cursor: pointer;
  transition: all .22s var(--ease);
  position: relative;
  overflow: hidden;
  will-change: transform;
}
.channel-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
}
.channel-card::after {
  content: '';
  position: absolute; inset: 0;
  background: var(--accent-grad);
  opacity: 0;
  transition: opacity .22s;
  border-radius: inherit;
  mix-blend-mode: overlay;
}
.channel-card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(139,92,246,.25);
  transform: translateY(-1px);
}
.channel-card.selected::after { opacity: .12; }
.channel-card.owned {
  opacity: .55; cursor: default;
  pointer-events: none;
}
.channel-card:not(.owned):active { transform: scale(.98); }

.ch-avatar {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
  position: relative; z-index: 1;
  box-shadow: 0 4px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
}
.ch-body { flex: 1; min-width: 0; position: relative; z-index: 1; }
.ch-name {
  font-size: 14.5px; font-weight: 700; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -.2px;
}
.ch-desc {
  font-size: 12px; color: var(--text2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ch-right {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 8px;
  flex-shrink: 0; position: relative; z-index: 1;
}
.ch-price {
  font-size: 15px; font-weight: 800;
  background: linear-gradient(135deg, #fff, #c4b5fd);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -.4px;
}
.ch-price span {
  font-size: 11px; color: var(--text3); font-weight: 500;
  -webkit-text-fill-color: var(--text3);
}
.check-ring {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all .2s var(--ease);
}
.channel-card.selected .check-ring {
  background: var(--accent-grad);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 12px var(--accent-glow);
}
.owned-chip {
  font-size: 10px; font-weight: 700;
  background: var(--green-lo); color: var(--green);
  border: 1px solid rgba(16,185,129,.3);
  padding: 4px 10px; border-radius: var(--rx);
  letter-spacing: .3px;
}

/* ── Cart ────────────────────────────────────────────────────────────── */
.cart-empty {
  display: flex; flex-direction: column; align-items: center;
  padding: 72px 20px; text-align: center;
}
.cart-empty-emoji {
  font-size: 64px; margin-bottom: 16px;
  filter: drop-shadow(0 4px 12px rgba(139,92,246,.3));
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-8px); }
}
.cart-empty-title {
  font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 6px;
}
.cart-empty-sub { font-size: 13px; color: var(--text2); }

.cart-item {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 13px 14px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  animation: slideIn .25s var(--ease);
  position: relative;
  overflow: hidden;
}
.cart-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent-grad);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-12px); }
  to   { opacity: 1; transform: translateX(0); }
}
.ci-icon {
  font-size: 22px; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px;
  background: var(--surface3);
  flex-shrink: 0;
}
.ci-body  { flex: 1; min-width: 0; }
.ci-name  { font-size: 13.5px; font-weight: 700; letter-spacing: -.2px; }
.ci-price {
  font-size: 12.5px; color: var(--accent2); margin-top: 3px;
  font-weight: 600;
}
.ci-remove {
  background: var(--surface3); border: 1px solid var(--border);
  color: var(--text3); font-size: 14px;
  cursor: pointer; padding: 0;
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: all .18s var(--ease);
}
.ci-remove:active {
  color: var(--red);
  background: rgba(244,63,94,.12);
  border-color: var(--red);
  transform: scale(.92);
}

.summary-block {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px; margin-top: 16px;
  position: relative;
  overflow: hidden;
}
.summary-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--accent-grad);
}
.sum-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 0; font-size: 13px; color: var(--text2);
}
.sum-row.grand {
  border-top: 1px solid var(--border);
  margin-top: 10px; padding-top: 13px;
  font-size: 17px; font-weight: 800; color: var(--text);
  letter-spacing: -.3px;
}
.sum-row.grand span:last-child {
  background: var(--accent-grad);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ── Subscriptions ───────────────────────────────────────────────────── */
.sub-card {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 13px;
  position: relative;
  overflow: hidden;
}
.sub-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--green);
  box-shadow: 0 0 12px var(--green);
}
.sub-dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  box-shadow: 0 0 8px var(--green), 0 0 0 4px rgba(16,185,129,.18);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 8px var(--green), 0 0 0 4px rgba(16,185,129,.18); }
  50%     { box-shadow: 0 0 12px var(--green), 0 0 0 8px rgba(16,185,129,.08); }
}
.sub-body { flex: 1; }
.sub-name { font-size: 13.5px; font-weight: 700; letter-spacing: -.2px; }
.sub-date { font-size: 11.5px; color: var(--text2); margin-top: 3px; }
.active-chip {
  font-size: 10px; font-weight: 700;
  background: var(--green-lo); color: var(--green);
  border: 1px solid rgba(16,185,129,.3);
  padding: 4px 10px; border-radius: var(--rx);
  letter-spacing: .3px;
}

/* ── Order card ──────────────────────────────────────────────────────── */
.order-card {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 13px 14px; margin-bottom: 10px;
}
.order-top { display: flex; justify-content: space-between; align-items: center; }
.order-id  { font-size: 11px; font-family: 'SF Mono', monospace; color: var(--text2); }
.order-amt {
  font-size: 14px; font-weight: 800;
  background: var(--accent-grad);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.order-meta{ font-size: 11.5px; color: var(--text3); margin-top: 5px; }

/* ── Checkout bar — Fixed at bottom (pehle wala style) ────────────────── */
.checkout-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 16px 16px;
  background: linear-gradient(to top, var(--bg) 70%, rgba(10,10,20,.95) 90%, transparent);
  z-index: 90;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.checkout-btn {
  width: 100%; height: 56px;
  background: var(--accent-grad);
  color: #fff; font-size: 15.5px; font-weight: 800;
  border: none; border-radius: var(--r);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: all .2s var(--ease);
  box-shadow: 0 8px 28px rgba(139,92,246,.45), inset 0 1px 0 rgba(255,255,255,.2);
  position: relative; overflow: hidden;
  letter-spacing: .2px;
}
.checkout-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
  transition: left .6s;
}
.checkout-btn:hover::before { left: 100%; }
.checkout-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,.1);
  opacity: 0; transition: opacity .15s;
}
.checkout-btn:active::after { opacity: 1; }
.checkout-btn:active { transform: scale(.98); }
.checkout-btn:disabled {
  background: var(--surface3);
  color: var(--text3); cursor: default;
  transform: none; box-shadow: none;
}
.checkout-sub {
  text-align: center; font-size: 11px; color: var(--text3);
  margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}

/* ── Skeleton ────────────────────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--r);
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skel-card { height: 82px; margin-bottom: 10px; }

/* ── Toast ───────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 110px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--surface3);
  border: 1px solid var(--border2);
  border-radius: var(--rx);
  padding: 12px 20px; font-size: 13px; font-weight: 600;
  white-space: nowrap; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: all .25s var(--ease);
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  backdrop-filter: blur(12px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error   { border-color: var(--red);   color: var(--red); }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.info    { border-color: var(--accent); color: var(--accent2); }

/* ── Loading / error states ──────────────────────────────────────────── */
.spinner-wrap {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 64px 20px; gap: 16px;
  color: var(--text2); font-size: 13px;
}
.spinner {
  width: 30px; height: 30px;
  border: 3px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-box {
  text-align: center; padding: 48px 20px;
  color: var(--text2); font-size: 14px;
}
.retry-btn {
  display: inline-block; margin-top: 16px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 24px;
  border-radius: var(--rx); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .18s;
}
.retry-btn:active {
  background: var(--surface3);
  transform: scale(.96);
}

/* ── User greeting bar ───────────────────────────────────────────────── */
.user-bar {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.user-bar::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 120px; height: 120px;
  background: radial-gradient(circle, var(--accent-lo), transparent 70%);
  pointer-events: none;
}
.user-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--accent-grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 4px 12px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.2);
  position: relative; z-index: 1;
}
.user-text { flex: 1; position: relative; z-index: 1; }
.user-name { font-size: 14px; font-weight: 700; letter-spacing: -.2px; }
.user-id   { font-size: 11px; color: var(--text3); font-family: 'SF Mono', monospace; margin-top: 2px; }

/* ── Empty subscriptions ─────────────────────────────────────────────── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  padding: 56px 20px; text-align: center;
}
.empty-emoji {
  font-size: 56px; margin-bottom: 14px;
  filter: drop-shadow(0 4px 12px rgba(139,92,246,.3));
}
.empty-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.empty-sub   { font-size: 13px; color: var(--text2); }
.empty-action {
  margin-top: 20px;
  background: var(--accent-grad); color: #fff;
  border: none; border-radius: var(--r);
  padding: 12px 28px; font-size: 13.5px; font-weight: 700;
  cursor: pointer; transition: all .2s;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.empty-action:active {
  transform: scale(.96);
}

/* ── Avatar gradient map — Vibrant palette ───────────────────────────── */
.av-0  { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
.av-1  { background: linear-gradient(135deg,#10b981,#059669); }
.av-2  { background: linear-gradient(135deg,#ec4899,#db2777); }
.av-3  { background: linear-gradient(135deg,#f59e0b,#d97706); }
.av-4  { background: linear-gradient(135deg,#06b6d4,#0891b2); }
.av-5  { background: linear-gradient(135deg,#f43f5e,#e11d48); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-glyph">🛍</div>
      <div class="logo-label">
        <div class="logo-name">N-Store</div>
        <div class="logo-sub">Premium Channel Access</div>
      </div>
    </div>
    <div class="header-actions">
      <div class="icon-btn" onclick="switchTab('cart')" title="Cart">
        🛒
        <span class="badge" id="cartBadge">0</span>
      </div>
    </div>
  </div>

  <div class="search-wrap" id="searchWrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput"
           placeholder="Channel dhundein..."
           oninput="filterChannels(this.value)"
           autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-store" onclick="switchTab('store')">🏪 Store</div>
    <div class="tab"        id="tab-cart"  onclick="switchTab('cart')">🛒 Cart</div>
    <div class="tab"        id="tab-subs"  onclick="switchTab('subs')">📋 Mine</div>
  </div>
</div>

<div class="page active" id="page-store">
  <div id="storeLoading">
    <div class="skel-card skeleton"></div>
    <div class="skel-card skeleton" style="opacity:.7"></div>
    <div class="skel-card skeleton" style="opacity:.45"></div>
  </div>
  <div id="storeContent" style="display:none">
    <div class="section-label" style="margin-top:4px">
      Available Channels <span id="channelCount" style="color:var(--accent2);margin-left:4px"></span>
    </div>
    <div id="channelList"></div>
    <div id="noResults" style="display:none" class="error-box">
      🔍 Koi channel nahi mila<br>
      <span style="font-size:12px;color:var(--text3)">Dusra naam try karein</span>
    </div>
  </div>
  <div class="error-box" id="storeError" style="display:none">
    ⚠️ Channels load nahi hue<br>
    <button class="retry-btn" onclick="loadChannels()">↩ Retry</button>
  </div>
</div>

<div class="page" id="page-cart">
  <div class="cart-empty" id="cartEmpty">
    <div class="cart-empty-emoji">🛒</div>
    <div class="cart-empty-title">Cart Khali Hai</div>
    <div class="cart-empty-sub">Store se channels select karein</div>
  </div>
  <div id="cartContent" style="display:none">
    <div class="section-label" style="margin-top:4px">Selected Channels</div>
    <div id="cartList"></div>
    <div class="summary-block" id="summaryBlock"></div>
  </div>
</div>

<div class="page" id="page-subs">
  <div id="subsLoading" class="spinner-wrap">
    <div class="spinner"></div>
    <span>Load ho raha hai…</span>
  </div>
  <div id="subsContent" style="display:none"></div>
  <div class="error-box" id="subsError" style="display:none">
    ⚠️ Load nahi hua<br>
    <button class="retry-btn" onclick="loadSubs(true)">↩ Retry</button>
  </div>
</div>

<div class="checkout-bar" id="checkoutBar" style="display:none">
  <button class="checkout-btn" id="checkoutBtn" onclick="doCheckout()">
    <span>💳</span>
    <span id="checkoutLabel">Checkout — ₹0</span>
  </button>
  <div class="checkout-sub">🔒 Secured by Razorpay · One-time payment</div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ── Telegram WebApp Init ─────────────────────────────────────────────── */
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  try { tg.setHeaderColor('#0a0a14'); } catch(e) {}
  try { tg.setBackgroundColor('#0a0a14'); } catch(e) {}
}

const tgUser  = tg?.initDataUnsafe?.user;
const urlId   = new URLSearchParams(location.search).get('user_id');
const USER_ID = tgUser?.id ? String(tgUser.id) : (urlId ?? null);
const USER_NAME = tgUser?.first_name || 'User';

// यहाँ हमने आपका नया Cloudflare सिक्योर लिंक जोड़ दिया है!
const BASE = 'https://fighter-ordinary-glossary-jumping.trycloudflare.com';

/* ── State ────────────────────────────────────────────────────────────── */
let allChannels  = [];
let ownedIds     = new Set();
let cart         = new Set();
let subsLoaded   = false;
let checkoutLock = false;

/* ── Gradient map for avatars ─────────────────────────────────────────── */
const AVATARS = ['av-0','av-1','av-2','av-3','av-4','av-5'];
const ICONS   = ['📢','📡','🔔','📻','🎯','💡','🌟','📌','🔥','⚡'];

/* ── Utility ──────────────────────────────────────────────────────────── */
function fmt(n) {
  return '₹' + Number(n).toLocaleString('en-IN');
}
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer = null;
function toast(msg, type = '', dur = 2800) {
  const el = document.getElementById('toast');
  clearTimeout(_toastTimer);
  el.textContent = msg;
  el.className = 'toast show ' + type;
  _toastTimer = setTimeout(() => { el.className = 'toast'; }, dur);
}

function haptic(style = 'light') {
  try { tg?.HapticFeedback?.impactOccurred(style); } catch(e) {}
}

/* ── Tab switching ────────────────────────────────────────────────────── */
function switchTab(name) {
  ['store','cart','subs'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-'  + t).classList.toggle('active', t === name);
  });

  document.getElementById('searchWrap').style.display =
    name === 'store' ? 'block' : 'none';

  document.getElementById('checkoutBar').style.display =
    (name === 'cart' && cart.size > 0) ? 'block' : 'none';

  if (name === 'cart')  renderCart();
  if (name === 'subs')  loadSubs();
}

/* ══════════════════════════════════════════════════════════════════════
   STORE — load & render
   ══════════════════════════════════════════════════════════════════════ */
async function loadChannels() {
  document.getElementById('storeLoading').style.display = 'block';
  document.getElementById('storeContent').style.display = 'none';
  document.getElementById('storeError').style.display   = 'none';

  try {
    const [chRes, subRes] = await Promise.allSettled([
      fetch(BASE + '/api/channels'),
      USER_ID ? fetch(BASE + '/api/subscriptions?user_id=' + USER_ID) : Promise.reject(),
    ]);

    if (chRes.status === 'fulfilled' && chRes.value.ok) {
      const d  = await chRes.value.json();
      allChannels = d.channels || [];
    } else {
      throw new Error('channels fetch failed');
    }

    if (subRes.status === 'fulfilled' && subRes.value.ok) {
      const sd = await subRes.value.json();
      ownedIds = new Set((sd.subscriptions || []).map(s => String(s.chat_id)));
    }

    renderChannels();
    document.getElementById('storeLoading').style.display = 'none';
    document.getElementById('storeContent').style.display = 'block';

  } catch(e) {
    document.getElementById('storeLoading').style.display = 'none';
    document.getElementById('storeError').style.display   = 'block';
  }
}

function renderChannels(filter = '') {
  const list    = document.getElementById('channelList');
  const noRes   = document.getElementById('noResults');
  const countEl = document.getElementById('channelCount');

  const q = filter.trim().toLowerCase();
  const visible = q
    ? allChannels.filter(c =>
        c.chat_title.toLowerCase().includes(q) ||
        (c.description || '').toLowerCase().includes(q))
    : allChannels;

  countEl.textContent = `(${visible.length})`;

  if (!visible.length) {
    list.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  list.innerHTML = visible.map((ch, i) => {
    const cid      = String(ch.chat_id);
    const owned    = ownedIds.has(cid);
    const selected = cart.has(cid);
    const avClass  = AVATARS[i % AVATARS.length];
    const icon     = ICONS[i % ICONS.length];

    return `
      <div class="channel-card ${selected?'selected':''} ${owned?'owned':''}"
           id="card-${cid}"
           ${!owned ? `onclick="toggleCart('${cid}')"` : ''}>
        <div class="ch-avatar ${avClass}">${icon}</div>
        <div class="ch-body">
          <div class="ch-name">${esc(ch.chat_title)}</div>
          <div class="ch-desc">${esc(ch.description || 'Premium channel')}</div>
        </div>
        <div class="ch-right">
          <div class="ch-price">${fmt(ch.amount)} <span>/join</span></div>
          ${owned
            ? '<span class="owned-chip">✓ Joined</span>'
            : `<div class="check-ring" id="chk-${cid}">${selected ? '✓' : ''}</div>`
          }
        </div>
      </div>`;
  }).join('');
}

function filterChannels(q) {
  renderChannels(q);
}

function toggleCart(chatId) {
  const id = String(chatId);
  if (ownedIds.has(id)) return;

  if (cart.has(id)) {
    cart.delete(id);
    haptic('light');
  } else {
    cart.add(id);
    haptic('medium');
  }
  updateBadge();
  renderChannels(document.getElementById('searchInput').value);
}

function updateBadge() {
  const b = document.getElementById('cartBadge');
  b.textContent = cart.size;
  b.classList.toggle('show', cart.size > 0);
}

/* ══════════════════════════════════════════════════════════════════════
   CART — render
   ══════════════════════════════════════════════════════════════════════ */
function renderCart() {
  const items = allChannels.filter(ch => cart.has(String(ch.chat_id)));
  const empty = items.length === 0;

  document.getElementById('cartEmpty').style.display   = empty ? 'flex' : 'none';
  document.getElementById('cartContent').style.display = empty ? 'none' : 'block';
  document.getElementById('checkoutBar').style.display = empty ? 'none' : 'block';

  if (empty) return;

  const total = items.reduce((s, c) => s + Number(c.amount), 0);

  document.getElementById('checkoutLabel').textContent =
    `Checkout — ${fmt(total)}`;

  document.getElementById('cartList').innerHTML = items.map((ch, i) => `
    <div class="cart-item">
      <div class="ci-icon">${ICONS[i % ICONS.length]}</div>
      <div class="ci-body">
        <div class="ci-name">${esc(ch.chat_title)}</div>
        <div class="ci-price">${fmt(ch.amount)}</div>
      </div>
      <button class="ci-remove" onclick="removeFromCart('${ch.chat_id}')" title="Remove">✕</button>
    </div>`).join('');

  document.getElementById('summaryBlock').innerHTML = `
    <div class="sum-row"><span>Channels</span><span>${items.length}</span></div>
    <div class="sum-row"><span>Subtotal</span><span>${fmt(total)}</span></div>
    <div class="sum-row grand"><span>Total</span><span>${fmt(total)}</span></div>`;
}

function removeFromCart(chatId) {
  cart.delete(String(chatId));
  haptic('light');
  updateBadge();
  renderCart();
  renderChannels(document.getElementById('searchInput').value);
}

/* ══════════════════════════════════════════════════════════════════════
   CHECKOUT
   ══════════════════════════════════════════════════════════════════════ */
async function doCheckout() {
  if (checkoutLock) return;

  if (!USER_ID) {
    toast('❌ Telegram se bot ke zariye open karein (/start)', 'error', 3500);
    return;
  }
  if (cart.size === 0) {
    toast('Cart khali hai!', 'error');
    return;
  }

  checkoutLock = true;
  const btn   = document.getElementById('checkoutBtn');
  const label = document.getElementById('checkoutLabel');
  btn.disabled = true;
  label.textContent = '⏳ Processing…';

  try {
    const res  = await fetch(BASE + '/api/checkout', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: USER_ID, chat_ids: [...cart] }),
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    if (data.payment_url) {
      toast('✅ Payment page khul raha hai!', 'success');
      haptic('success');

      cart.clear();
      updateBadge();
      renderChannels(document.getElementById('searchInput').value);
      renderCart();

      setTimeout(() => {
        if (tg?.openLink) tg.openLink(data.payment_url);
        else window.open(data.payment_url, '_blank');
      }, 400);
    }
  } catch(e) {
    toast('❌ ' + e.message, 'error', 3500);
    haptic('error');
  } finally {
    checkoutLock = false;
    btn.disabled = false;
    renderCart();
  }
}

/* ══════════════════════════════════════════════════════════════════════
   SUBSCRIPTIONS
   ══════════════════════════════════════════════════════════════════════ */
async function loadSubs(force = false) {
  if (subsLoaded && !force) return;

  document.getElementById('subsLoading').style.display = 'flex';
  document.getElementById('subsContent').style.display = 'none';
  document.getElementById('subsError').style.display   = 'none';

  if (!USER_ID) {
    document.getElementById('subsLoading').style.display = 'none';
    document.getElementById('subsContent').style.display = 'block';
    document.getElementById('subsContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">🔒</div>
        <div class="empty-title">Login Required</div>
        <div class="empty-sub">Telegram bot se /start karke Mini App kholein</div>
      </div>`;
    return;
  }

  try {
    const res  = await fetch(BASE + '/api/subscriptions?user_id=' + USER_ID);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const subs   = data.subscriptions || [];
    const orders = data.orders        || [];
    subsLoaded   = true;

    let html = '';

    html += `
      <div class="user-bar">
        <div class="user-avatar">👤</div>
        <div class="user-text">
          <div class="user-name">${esc(USER_NAME)}</div>
          <div class="user-id">ID: ${USER_ID}</div>
        </div>
      </div>`;

    if (subs.length) {
      html += `<div class="section-label">Active Channels (${subs.length})</div>`;
      html += subs.map(s => `
        <div class="sub-card">
          <div class="sub-dot"></div>
          <div class="sub-body">
            <div class="sub-name">${esc(s.chat_title)}</div>
            <div class="sub-date">Joined ${s.joined_at?.slice(0,10) || '—'}</div>
          </div>
          <span class="active-chip">Active</span>
        </div>`).join('');
    } else {
      html += `
        <div class="empty-state" style="padding:40px 0 20px">
          <div class="empty-emoji">📭</div>
          <div class="empty-title">Koi Subscription Nahi</div>
          <div class="empty-sub">Store se channels khariden</div>
          <button class="empty-action" onclick="switchTab('store')">🏪 Store Dekhein</button>
        </div>`;
    }

    if (orders.length) {
      html += `<div class="section-label" style="margin-top:20px">Order History</div>`;
      html += orders.map(o => {
        const chCount = (() => { try { return JSON.parse(o.chat_ids).length; } catch(e) { return '?'; } })();
        return `
          <div class="order-card">
            <div class="order-top">
              <span class="order-id">${esc(o.order_id)}</span>
              <span class="order-amt">${fmt(o.total_amount)}</span>
            </div>
            <div class="order-meta">${chCount} channel${chCount===1?'':'s'} · ${o.paid_at?.slice(0,10) || '—'}</div>
          </div>`;
      }).join('');
    }

    document.getElementById('subsContent').innerHTML = html;
    document.getElementById('subsLoading').style.display = 'none';
    document.getElementById('subsContent').style.display = 'block';

  } catch(e) {
    document.getElementById('subsLoading').style.display = 'none';
    document.getElementById('subsError').style.display   = 'block';
  }
}

document.getElementById('tab-cart').addEventListener('click', renderCart);
loadChannels();
</script>
</body>
</html>
